# ============================================================
# 모니터링 스택: Prometheus + Grafana
# ============================================================
# 사용법 (EC2에서):
#   cd monitoring
#   docker-compose up -d
#
# 접속:
#   Prometheus : http://{EC2_IP}:9091
#   Grafana    : http://{EC2_IP}:3000  (admin / admin)
#
# 주의: EC2 보안 그룹에서 9091, 3000 포트를 열어야 합니다.
#       운영 환경에서는 Grafana만 외부에 노출하고
#       Prometheus는 내부 접근만 허용하는 것을 권장합니다.
# ============================================================

version: '3.8'

services:

  # ----------------------------------------------------------
  # Prometheus
  # ----------------------------------------------------------
  # Spring Boot 앱의 /actuator/prometheus 엔드포인트를
  # 15초마다 스크래핑(pull)하여 시계열 메트릭 데이터를 저장합니다.
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      # 9091로 노출 (9090은 Spring Boot에서 actuator 포트로 사용할 수 있어 충돌 방지)
      - "9091:9090"
    volumes:
      # prometheus.yml: 스크래핑 대상(Spring 앱) 설정 파일
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      # 메트릭 데이터 영구 저장 (컨테이너 재시작 시에도 데이터 유지)
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      # 메트릭 데이터 보존 기간: 15일
      # 저장 공간이 부족하면 줄이거나, 장기 보관이 필요하면 늘릴 것
      - '--storage.tsdb.retention.time=15d'
      # 데이터 저장 경로
      - '--storage.tsdb.path=/prometheus'
      # 런타임 중 설정 파일 재로드 API 활성화
      # curl -X POST http://localhost:9091/-/reload 로 설정 재로드 가능
      - '--web.enable-lifecycle'
    networks:
      - monitoring

  # ----------------------------------------------------------
  # Grafana
  # ----------------------------------------------------------
  # Prometheus에 저장된 메트릭을 시각화하는 대시보드 툴입니다.
  # 사전 구성된 datasource/dashboard가 자동으로 로드됩니다.
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # 초기 관리자 계정 (최초 로그인 후 반드시 비밀번호 변경할 것)
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # 익명 접근 비활성화 (로그인 필수)
      - GF_AUTH_ANONYMOUS_ENABLED=false
      # 타임존 설정
      - GF_DEFAULT_THEME=dark
      # 플러그인 자동 설치 (필요 시 추가)
      # - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      # Grafana 대시보드, 설정 데이터 영구 저장
      - grafana_data:/var/lib/grafana
      # 데이터소스 자동 프로비저닝: Grafana 시작 시 Prometheus를 자동으로 datasource로 등록
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      # 대시보드 자동 프로비저닝: JSON 파일로 대시보드 자동 등록
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - monitoring

# ----------------------------------------------------------
# 볼륨 (데이터 영구 저장)
# ----------------------------------------------------------
volumes:
  prometheus_data:
    # Prometheus 메트릭 데이터 저장소
    # docker volume ls 로 확인 가능
  grafana_data:
    # Grafana 대시보드, 사용자 설정 저장소

# ----------------------------------------------------------
# 네트워크
# ----------------------------------------------------------
networks:
  monitoring:
    # Prometheus ↔ Grafana 내부 통신용 네트워크
    # 외부에서는 접근 불가, 두 컨테이너 간 컨테이너명으로 통신 가능
    driver: bridge

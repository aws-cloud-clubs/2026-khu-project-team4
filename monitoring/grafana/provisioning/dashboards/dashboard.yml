# ============================================================
# Grafana 대시보드 자동 프로비저닝
# ============================================================
# /var/lib/grafana/dashboards 경로의 JSON 파일을 읽어
# 대시보드를 자동으로 등록합니다.
# ============================================================

apiVersion: 1

providers:
  - name: 'khunghap-dashboards'
    orgId: 1
    # 대시보드 JSON 파일이 위치한 경로 (컨테이너 내부 경로)
    folder: 'Khunghap'
    type: file
    # 파일이 변경되면 자동으로 대시보드 업데이트
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      # 하위 폴더도 탐색
      foldersFromFilesStructure: true

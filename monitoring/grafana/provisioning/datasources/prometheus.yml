# ============================================================
# Grafana 데이터소스 자동 프로비저닝
# ============================================================
# Grafana 시작 시 이 파일을 읽어 Prometheus를 데이터소스로 자동 등록합니다.
# 수동으로 Grafana UI에서 추가할 필요 없습니다.
# ============================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    # docker-compose 네트워크 내에서 컨테이너명으로 접근
    url: http://prometheus:9090
    # 기본 데이터소스로 설정 (대시보드에서 자동 선택됨)
    isDefault: true
    access: proxy
    editable: true
    jsonData:
      # Prometheus 스크래핑 주기와 맞춰서 설정 (15s)
      timeInterval: "15s"
      # HTTP 메서드 (POST가 긴 쿼리에 유리)
      httpMethod: POST
